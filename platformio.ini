; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
; framework = arduino
framework = espidf
lib_deps =
    https://github.com/martinmoene/ring-span-lite.git
check_tool = clangtidy, cppcheck
check_flags =
  clangtidy: --config-file=${project_dir}/.clang-tidy --header-filter=${project_dir}/drivers/.*
build_src_filter = +<*> +<**/*.cppm>
build_unflags = -std=gnu++11
; extra_scripts = pre:clangtidy.py

[platformio]
# Change the directories here
src_dir = applications/
include_dir = drivers/

[env]
build_flags =
    -std=c++2a
build_src_flags = 
    -fmodules-ts
extra_scripts = pre:generate_conanfile.py